# Ntivo local development services
# Start: docker compose up -d
# Stop:  docker compose down
# Reset: docker compose down -v  (wipes all data)

services:
  neo4j:
    image: neo4j:5-community
    container_name: ntivo-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol (driver connections)
    environment:
      NEO4J_AUTH: neo4j/ntivo_dev_password
      NEO4J_PLUGINS: '[]'
      # Allow creating multiple databases (needed for per-tenant org_{orgId} databases)
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: ntivo-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (used by Kotlin client)
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
